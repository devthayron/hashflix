{% load static %}
<nav class='w-full flex justify-between items-center py-3 px-4 fixed z-50'>
    {% if user.is_authenticated %}
    <div class='w-6/12'>
        <a href="{% url 'filmes:list' %}">
            <img class='w-2/12' src="{% static 'images/hashflix.png' %}">
        </a>
    </div>
    {% else %}
        <div class='w-6/12'>
        <a href="/">
            <img class='w-2/12' src="{% static 'images/hashflix.png' %}">
        </a>
    </div>
    {% endif %}
    <div class='w-6/12 flex flex-nowrap justify-end'>
        {% if user.is_authenticated %}
        <div class='mr-2'>
            <form method="get" action="{% url 'filmes:search' %}">
                <input type="text" class='py-1 px-2 rounded-md text-black' name="q" value="{{ request.GET.q }}" placeholder='Pesquisar...'>
                <input type="submit" value="">
            </form>
        </div>
        
        <div class='mr-2'>
            <a href="{% url 'usuarios:logout' %}">
                <button class='bg-red-600 text-white py-1 px-3 rounded-md'>
                    Sair
                </button>
            </a>
        </div>
    {% else %}
        <div class='mr-2'>
            <a href="{% url 'usuarios:login' %}">
                <button class='bg-red-600 text-white py-1 px-3 rounded-md'>
                    Login
                </button>
            </a>
        </div>
    {% endif %}

    {% if user.is_authenticated %}
        <div class='mr-2'>
            <a href="#">
                <button class='bg-red-600 text-white py-1 px-3 rounded-md'>
                    Editar Perfil
                </button>
            </a>
        </div>
    {% endif %}
    </div>
</nav>
