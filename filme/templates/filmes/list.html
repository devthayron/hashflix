{% extends "base.html" %}

{% block titulo %}
HomeFilmes Hashflix
{% endblock  %}

{% block content %}
<h1>home filmes</h1>

{% for filme in filmes %}
    <p>{{ filme }}</p>
    <a href="{% url 'filmes:detail' filme.pk %}">
        <img src="{{ filme.thumb.url }}" alt="{{ filme }}">
        </a>
    <p>{{ filme.descricao }}</p>
{% endfor %}
{% endblock  %}
